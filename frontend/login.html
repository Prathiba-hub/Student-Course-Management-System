<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>Welcome Back!</h1>

        <p>
            Continue your learning journey by accessing your dashboard,
            enrolled courses, progress reports, and certificates.
        </p>

    </div>

    <div class="right-panel">

        <form>

            <h2>Student Login</h2>

            <div class="input-box">

                <label>Email Address</label>

                <input type="email"
                       placeholder="Enter your email"
                       required>

            </div>

            <div class="input-box">

                <label>Password</label>

                <input type="password"
                       placeholder="Enter your password"
                       required>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="forgot-password.html">

                    Forgot Password?

                </a>

            </div>

            <button type="submit">

                Login

            </button>

            <p class="register">

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </p>

        </form>

    </div>

</div>

</body>
</html>
