<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login | EduTrack LMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#4e9eff);
}

/* Login Card */

.container{
width:420px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
animation:fade .8s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo i{
font-size:60px;
color:#0d6efd;
}

.logo h2{
margin-top:10px;
color:#0d6efd;
}

.subtitle{
text-align:center;
margin-bottom:30px;
color:#666;
}

/* Inputs */

.input-box{
margin-bottom:20px;
position:relative;
}

.input-box label{
display:block;
margin-bottom:8px;
font-weight:500;
}

.input-box input{
width:100%;
padding:13px 45px 13px 15px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
transition:.3s;
}

.input-box input:focus{
border-color:#0d6efd;
box-shadow:0 0 6px rgba(13,110,253,.2);
}

.input-box i{
position:absolute;
right:15px;
top:44px;
cursor:pointer;
color:#666;
}

/* Options */

.options{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
margin-bottom:25px;
}

.options a{
text-decoration:none;
color:#0d6efd;
}

/* Button */

button{
width:100%;
padding:14px;
border:none;
background:#0d6efd;
color:white;
font-size:16px;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0b5ed7;
}

/* Bottom Links */

.links{
margin-top:25px;
text-align:center;
}

.links a{
text-decoration:none;
color:#0d6efd;
font-weight:600;
}

.back{
margin-top:15px;
}

.back a{
color:#555;
text-decoration:none;
}

@media(max-width:450px){

.container{
width:92%;
padding:30px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<i class="fa-solid fa-user-graduate"></i>

<h2>Student Portal</h2>

</div>

<p class="subtitle">
Login to continue your learning journey.
</p>

<form action="student-dashboard.html">

<div class="input-box">

<label>Email Address</label>

<input type="email"
placeholder="Enter your email"
required>

<i class="fa-solid fa-envelope"></i>

</div>

<div class="input-box">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

<i
class="fa-solid fa-eye"
id="togglePassword"></i>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<div class="links">

Don't have an account?

<a href="student-register.html">

Register

</a>

</div>

<div class="back">

<a href="index.html">

<i class="fa-solid fa-arrow-left"></i>

Back to Home

</a>

</div>

</div>

<script>

const password=document.getElementById("password");
const toggle=document.getElementById("togglePassword");

toggle.onclick=function(){

if(password.type==="password"){

password.type="text";

toggle.classList.replace("fa-eye","fa-eye-slash");

}
else{

password.type="password";

toggle.classList.replace("fa-eye-slash","fa-eye");

}

}

</script>

</body>
</html>
