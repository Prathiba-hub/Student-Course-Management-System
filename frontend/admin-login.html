<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | EduTrack LMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
}

.container{
width:420px;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo i{
font-size:60px;
color:#1e3a8a;
}

.logo h2{
margin-top:10px;
color:#1e3a8a;
}

.logo p{
margin-top:8px;
color:#666;
}

.input-box{
margin-bottom:20px;
position:relative;
}

.input-box label{
display:block;
margin-bottom:8px;
font-weight:500;
}

.input-box input{
width:100%;
padding:13px 45px 13px 15px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
font-size:15px;
}

.input-box input:focus{
border-color:#1e3a8a;
}

.input-box i{
position:absolute;
right:15px;
top:44px;
cursor:pointer;
color:#777;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
font-size:14px;
}

.options a{
text-decoration:none;
color:#1e3a8a;
}

button{
width:100%;
padding:14px;
background:#1e3a8a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#163172;
}

.links{
margin-top:20px;
text-align:center;
}

.links a{
text-decoration:none;
color:#1e3a8a;
font-weight:600;
}

.back{
margin-top:15px;
text-align:center;
}

.back a{
text-decoration:none;
color:#555;
}

@media(max-width:450px){

.container{
width:92%;
padding:30px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<i class="fa-solid fa-user-shield"></i>

<h2>Administrator Portal</h2>

<p>Secure Login for Administrators</p>

</div>

<form action="admin-dashboard.html">

<div class="input-box">

<label>Email Address</label>

<input
type="email"
placeholder="Enter admin email"
required>

<i class="fa-solid fa-envelope"></i>

</div>

<div class="input-box">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter password"
required>

<i
class="fa-solid fa-eye"
id="togglePassword"></i>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">

<i class="fa-solid fa-right-to-bracket"></i>

Admin Login

</button>

</form>

<div class="links">

Don't have an Admin account?

<a href="admin-register.html">

Register

</a>

</div>

<div class="back">

<a href="index.html">

<i class="fa-solid fa-arrow-left"></i>

Back to Home

</a>

</div>

</div>

<script>

const password=document.getElementById("password");
const toggle=document.getElementById("togglePassword");

toggle.onclick=function(){

if(password.type==="password"){

password.type="text";
toggle.classList.replace("fa-eye","fa-eye-slash");

}else{

password.type="password";
toggle.classList.replace("fa-eye-slash","fa-eye");

}

}

</script>

</body>
</html>
